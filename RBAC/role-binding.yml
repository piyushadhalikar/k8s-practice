kind: RoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: apache-manager-rolebinding
  namespace: apache

subjects:
- kind: User
  name: apache-user
  apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: Role
  name: apache-manager
  apiGroup: rbac.authorization.k8s.io

#Output:

1. create role-binding
  kubectl apply -f role-binding.yml 
  rolebinding.rbac.authorization.k8s.io/apache-manager-rolebinding created

2. kubectl get rolebinding -n apache
  NAME                         ROLE                  AGE
  apache-manager-rolebinding   Role/apache-manager   21s
